<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calory Tracker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0f14;--surface:#161a24;--surface2:#1e2330;--border:#252c3d;
      --accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;
      --yellow:#f59e0b;--orange:#f97316;--text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* NAV */
    nav{display:flex;gap:2px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
    nav button{flex:1;padding:8px 4px;background:transparent;border:none;color:var(--muted);font-size:0.75rem;font-weight:600;cursor:pointer;border-radius:8px;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px}
    nav button .icon{font-size:1.2rem}
    nav button.active{background:var(--surface2);color:var(--accent2)}
    nav button:hover:not(.active){color:var(--text)}

    /* PAGES */
    .page{display:none;padding:16px;max-width:600px;margin:0 auto}
    .page.active{display:block}

    /* CARDS */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
    .card-title{font-size:1rem;font-weight:600;margin-bottom:4px}
    .card-sub{font-size:0.8rem;color:var(--muted2)}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border:none;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all .15s}
    .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#4f46e5}
    .btn-ghost{background:var(--surface2);color:var(--muted2)}.btn-ghost:hover{color:var(--text)}
    .btn-danger{background:#450a0a;color:var(--red)}.btn-danger:hover{background:#7f1d1d}
    .btn-green{background:#052e16;color:var(--green)}.btn-green:hover{background:#14532d}
    .btn-sm{padding:6px 12px;font-size:0.78rem}
    .btn-block{width:100%;justify-content:center}

    /* FORMS */
    .form-group{margin-bottom:14px}
    label{display:block;font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
    input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:0.88rem;font-family:inherit}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
    textarea{resize:vertical;min-height:60px}

    /* MODALS */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;padding:16px}
    .modal-bg.open{display:flex}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
    .modal h2{font-size:1rem;font-weight:700;margin-bottom:16px;color:var(--accent2)}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

    /* HEADER ROW */
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .page-header h2{font-size:1.1rem;font-weight:700}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
    .stat-val{font-size:1.4rem;font-weight:700;color:var(--accent2)}
    .stat-lbl{font-size:0.68rem;color:var(--muted);text-transform:uppercase;margin-top:2px}
    .stat-val.green{color:var(--green)}
    .stat-val.yellow{color:var(--yellow)}
    .stat-val.orange{color:var(--orange)}

    /* BAR CHART */
    .chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .bar-label{width:40px;font-size:0.78rem;color:var(--muted2);text-align:right;flex-shrink:0}
    .bar-track{flex:1;background:var(--surface2);border-radius:4px;height:24px;position:relative;overflow:hidden}
    .bar-fill{height:100%;border-radius:4px;transition:width .3s ease;min-width:2px}
    .bar-fill.green{background:var(--green)}
    .bar-fill.accent{background:var(--accent)}
    .bar-fill.yellow{background:var(--yellow)}
    .bar-val{width:55px;font-size:0.78rem;color:var(--muted2);flex-shrink:0}

    /* DAY ITEM */
    .day-item{cursor:pointer}.day-item:hover{border-color:var(--accent)}
    .day-macros{display:flex;gap:12px;margin-top:8px}
    .day-macro{text-align:center}
    .day-macro .val{font-size:0.85rem;font-weight:600}
    .day-macro .lbl{font-size:0.62rem;color:var(--muted);text-transform:uppercase}

    /* MEAL ITEM */
    .meal-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
    .meal-item:last-child{border-bottom:none}
    .meal-name{font-size:0.9rem;font-weight:500}
    .meal-detail{font-size:0.78rem;color:var(--muted2)}
    .meal-kcal{font-weight:600;color:var(--accent2);font-size:0.9rem}
    .meal-grams{font-size:0.75rem;color:var(--muted);margin-left:6px}
    .meal-remove{background:none;border:none;color:var(--red);cursor:pointer;font-size:1.1rem;opacity:0.5;padding:4px}
    .meal-remove:hover{opacity:1}

    /* SUBTOTAL */
    .subtotal{padding:8px 0 4px;font-size:0.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;border-top:1px solid var(--border);margin-top:4px}

    /* EMPTY */
    .empty{text-align:center;color:var(--muted);padding:40px 16px;font-size:0.9rem}

    /* TAG */
    .tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:0.7rem;font-weight:600;background:var(--surface2);color:var(--muted2);margin-right:4px}

    /* TOAST */
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--muted2);padding:10px 18px;border-radius:8px;font-size:.82rem;z-index:999;white-space:nowrap}

    /* DETAIL HEADER */
    .detail-header{text-align:center;padding:16px 0}
    .detail-day{font-size:1.5rem;font-weight:700}
    .detail-kcal{font-size:2.2rem;font-weight:700;color:var(--accent2);margin:4px 0}
  </style>
</head>
<body id="app-body" style="display:none">

<!-- NAV -->
<nav>
  <button class="active" onclick="showPage('dashboard')" id="nav-dashboard"><span class="icon">🏠</span>Home</button>
  <button onclick="showPage('weekly')" id="nav-weekly"><span class="icon">📊</span>Weekly</button>
  <button onclick="showPage('history')" id="nav-history"><span class="icon">📅</span>History</button>
  <button onclick="showPage('add')" id="nav-add"><span class="icon">➕</span>Add</button>
  <button onclick="logout()" id="nav-logout"><span class="icon">🚪</span>Logout</button>
</nav>

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">
  <div style="padding:24px 0 16px">
    <div style="font-size:1.5rem;font-weight:700">Calory Tracker</div>
    <div style="color:var(--muted);font-size:.9rem;margin-top:4px" id="dash-date"></div>
  </div>

  <div class="stats-row" id="dash-stats"></div>

  <div class="page-header"><h2>Recent Days</h2></div>
  <div id="dash-recent"></div>
</div>

<!-- WEEKLY -->
<div class="page" id="page-weekly">
  <div class="page-header"><h2>Weekly Overview</h2></div>
  <div class="chart-wrap" id="weekly-chart"></div>
  <div class="stats-row" id="weekly-stats"></div>
  <div id="weekly-days"></div>
</div>

<!-- HISTORY -->
<div class="page" id="page-history">
  <div class="page-header"><h2>All Days</h2></div>
  <div id="history-list"></div>
</div>

<!-- ADD MEAL -->
<div class="page" id="page-add">
  <div class="page-header"><h2>Add Meal</h2></div>
  <div id="add-form">
    <div class="form-group"><label>Day Number</label><input id="a-day" type="number" placeholder="e.g. 62"/></div>
    <div class="form-group"><label>Food Name</label><input id="a-name" placeholder="e.g. Grilled chicken"/></div>
    <div class="form-group"><label>Weight (grams)</label><input id="a-grams" type="number" placeholder="e.g. 200"/></div>
    <div class="form-group"><label>Kcal</label><input id="a-kcal" type="number" placeholder="e.g. 350"/></div>
    <div class="form-group"><label>Protein (g)</label><input id="a-protein" type="number" placeholder="e.g. 40"/></div>
    <div class="form-group"><label>Fat (g)</label><input id="a-fat" type="number" placeholder="e.g. 15"/></div>
    <div class="form-group"><label>Net Carbs (g)</label><input id="a-net_carbs" type="number" placeholder="e.g. 2"/></div>
    <button class="btn btn-primary btn-block" onclick="addMeal()">+ Add Meal</button>
  </div>
</div>

<!-- MODAL: Day Detail -->
<div class="modal-bg" id="modal-day">
  <div class="modal" style="max-width:500px">
    <h2 id="day-modal-title">Day</h2>
    <div id="day-modal-content"></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modal-day')">Close</button></div>
  </div>
</div>

<script>
// ===================== AUTH =====================
const TOKEN_KEY = 'calory_token';
const USER_KEY = 'calory_user';

function getToken() { return localStorage.getItem(TOKEN_KEY); }
function getUser() {
  try { return JSON.parse(localStorage.getItem(USER_KEY)); } catch { return null; }
}

function logout() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(USER_KEY);
  window.location.href = '/login';
}

function apiFetch(url, opts = {}) {
  const token = getToken();
  const headers = opts.headers || {};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(url, { ...opts, headers }).then(async (res) => {
    const ct = res.headers.get('content-type') || '';
    if (ct.includes('application/json')) return res.json();
    return {};
  }).catch(err => { console.error('apiFetch error:', err); return null; });
}

// Auth guard — redirect if not logged in
(function checkAuth() {
  if (!getToken()) {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0d0f14;color:#e2e8f0;font-family:sans-serif"><div style="text-align:center"><div style="font-size:2rem">Calory Tracker</div><div style="color:#64748b;margin:16px 0">Redirecting to login…</div></div></div>';
    window.location.href = '/login';
    return;
  }
  document.getElementById('app-body').style.display = 'block';
})();

// ===================== NAV =====================
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'dashboard') loadDashboard();
  if (name === 'weekly') loadWeekly();
  if (name === 'history') loadHistory();
}

// ===================== UTILS =====================
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ===================== DASHBOARD =====================
async function loadDashboard() {
  document.getElementById('dash-date').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  const [stats, recent] = await Promise.all([
    apiFetch('/api/stats'),
    apiFetch('/api/days').then(d => (d || []).filter(x => x.kcal > 0).sort((a,b) => b.day_num - a.day_num).slice(0,7)),
  ]);

  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card"><div class="stat-val">${stats.daysLogged}</div><div class="stat-lbl">Days Logged</div></div>
    <div class="stat-card"><div class="stat-val green">${stats.rollingAvg || '-'}</div><div class="stat-lbl">7d Avg Kcal</div></div>
    <div class="stat-card"><div class="stat-val yellow">${Math.round(stats.totalKcal) || '-'}</div><div class="stat-lbl">Week Kcal</div></div>
  `;

  document.getElementById('dash-recent').innerHTML = recent.length ? recent.map(d => `
    <div class="card day-item" onclick="openDay(${d.day_num})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div class="card-title">Day ${d.day_num}</div><div class="card-sub">${d.item_count || 0} meals logged</div></div>
        <div style="text-align:right"><div style="font-size:1.2rem;font-weight:700;color:var(--accent2)">${Math.round(d.kcal)}</div><div class="card-sub">kcal</div></div>
      </div>
      <div class="day-macros">
        <div class="day-macro"><div class="val">${d.protein || 0}g</div><div class="lbl">Protein</div></div>
        <div class="day-macro"><div class="val">${d.fat || 0}g</div><div class="lbl">Fat</div></div>
        <div class="day-macro"><div class="val">${d.net_carbs || 0}g</div><div class="lbl">Net C</div></div>
      </div>
    </div>
  `).join('') : '<div class="empty">No data yet. Seed diary.md or add meals manually.</div>';
}

// ===================== WEEKLY =====================
async function loadWeekly() {
  const days = await apiFetch('/api/days').then(d => (d || []).filter(x => x.kcal > 0));
  if (!days.length) { document.getElementById('weekly-chart').innerHTML = '<div class="empty">No data yet.</div>'; return; }

  const maxKcal = Math.max(...days.map(d => d.kcal), 1);
  const colors = ['accent', 'accent', 'accent', 'yellow', 'green', 'green', 'green'];

  // Bar chart
  document.getElementById('weekly-chart').innerHTML = `
    <div style="font-size:.78rem;color:var(--muted);margin-bottom:12px;font-weight:600">Calories by Day</div>
    ${days.map((d, i) => `
      <div class="bar-row">
        <div class="bar-label">Day ${d.day_num}</div>
        <div class="bar-track"><div class="bar-fill ${colors[i % colors.length]}" style="width:${(d.kcal / maxKcal * 100).toFixed(1)}%"></div></div>
        <div class="bar-val">${Math.round(d.kcal)}</div>
      </div>
    `).join('')}
  `;

  // Rolling 7-day stats
  const rolling = days.slice(-7);
  const avgKcal = Math.round(rolling.reduce((s, d) => s + d.kcal, 0) / rolling.length);
  const totalP = Math.round(rolling.reduce((s, d) => s + (d.protein || 0), 0));
  const totalF = Math.round(rolling.reduce((s, d) => s + (d.fat || 0), 0));
  const totalC = Math.round(rolling.reduce((s, d) => s + (d.net_carbs || 0), 0) * 10) / 10;

  document.getElementById('weekly-stats').innerHTML = `
    <div class="stat-card"><div class="stat-val">${avgKcal}</div><div class="stat-lbl">7d Avg</div></div>
    <div class="stat-card"><div class="stat-val green">${totalP}g</div><div class="stat-lbl">Protein</div></div>
    <div class="stat-card"><div class="stat-val">${totalF}g</div><div class="stat-lbl">Fat</div></div>
  `;

  // Rolling average for last day
  if (rolling.length >= 2) {
    const last7 = rolling;
    const rAvg = Math.round(last7.reduce((s, d) => s + d.kcal, 0) / last7.length);
    document.getElementById('weekly-stats').innerHTML += `
      <div class="stat-card"><div class="stat-val orange">${totalC}g</div><div class="stat-lbl">Net Carbs</div></div>
    `;
  }

  document.getElementById('weekly-days').innerHTML = days.map(d => `
    <div class="card day-item" onclick="openDay(${d.day_num})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="card-title">Day ${d.day_num}</div>
        <div style="text-align:right"><span style="font-weight:700;color:var(--accent2)">${Math.round(d.kcal)}</span> <span style="color:var(--muted);font-size:.8rem">kcal</span></div>
      </div>
      <div class="day-macros">
        <div class="day-macro"><div class="val">${d.protein || 0}g</div><div class="lbl">Protein</div></div>
        <div class="day-macro"><div class="val">${d.fat || 0}g</div><div class="lbl">Fat</div></div>
        <div class="day-macro"><div class="val">${d.net_carbs || 0}g</div><div class="lbl">Net C</div></div>
      </div>
    </div>
  `).join('');
}

// ===================== HISTORY =====================
async function loadHistory() {
  const days = await apiFetch('/api/days') || [];
  if (!days.length) { document.getElementById('history-list').innerHTML = '<div class="empty">No data yet.</div>'; return; }

  document.getElementById('history-list').innerHTML = days.map(d => `
    <div class="card day-item" onclick="openDay(${d.day_num})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="card-title">Day ${d.day_num}</div>
        <div style="text-align:right"><span style="font-weight:700;color:var(--accent2)">${Math.round(d.kcal)}</span> <span style="color:var(--muted);font-size:.8rem">kcal</span></div>
      </div>
      <div class="day-macros">
        <div class="day-macro"><div class="val">${d.protein || 0}g</div><div class="lbl">Protein</div></div>
        <div class="day-macro"><div class="val">${d.fat || 0}g</div><div class="lbl">Fat</div></div>
        <div class="day-macro"><div class="val">${d.net_carbs || 0}g</div><div class="lbl">Net C</div></div>
      </div>
    </div>
  `).join('');
}

// ===================== DAY DETAIL =====================
async function openDay(dayNum) {
  const [day, meals] = await Promise.all([
    apiFetch('/api/days').then(d => (d || []).find(x => x.day_num === dayNum)),
    apiFetch('/api/meals/' + dayNum),
  ]);
  if (!day) { toast('Day not found'); return; }

  document.getElementById('day-modal-title').textContent = 'Day ' + dayNum;

  let rows = '';

  for (const m of meals) {
    rows += `
      <div class="meal-item">
        <div><div class="meal-name">${m.name}</div><div class="meal-detail">${m.grams ? m.grams + 'g' : ''}</div></div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="text-align:right"><div class="meal-kcal">${Math.round(m.kcal)} kcal</div>
            <div style="font-size:.72rem;color:var(--muted2)">${m.protein || 0}g · ${m.fat || 0}g · ${m.net_carbs || 0}g</div>
          </div>
          <button class="meal-remove" onclick="removeMeal(${m.id})">✕</button>
        </div>
      </div>`;
  }

  // Grand total
  rows += `
    <div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:700;font-size:1rem">Total</div>
        <div style="text-align:right">
          <div style="font-size:1.4rem;font-weight:700;color:var(--accent2)">${Math.round(day.kcal)} kcal</div>
          <div style="font-size:.78rem;color:var(--muted2)">${day.protein || 0}g P · ${day.fat || 0}g F · ${day.net_carbs || 0}g C</div>
        </div>
      </div>
    </div>`;

  document.getElementById('day-modal-content').innerHTML = rows;
  openModal('modal-day');
}

async function removeMeal(id) {
  await apiFetch('/api/meals/' + id, { method: 'DELETE' });
  closeModal('modal-day');
  toast('Meal removed');
  loadDashboard();
}

// ===================== ADD MEAL =====================
async function addMeal() {
  const day = parseInt(document.getElementById('a-day').value);
  const name = document.getElementById('a-name').value.trim();
  const grams = parseFloat(document.getElementById('a-grams').value) || 0;
  const kcal = parseFloat(document.getElementById('a-kcal').value) || 0;
  const protein = parseFloat(document.getElementById('a-protein').value) || 0;
  const fat = parseFloat(document.getElementById('a-fat').value) || 0;
  const net_carbs = parseFloat(document.getElementById('a-net_carbs').value) || 0;

  if (!day || !name) { toast('Day and name required'); return; }

  await apiFetch('/api/meals', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ day_num: day, name, grams, kcal, protein, fat, net_carbs }),
  });

  document.getElementById('a-day').value = '';
  document.getElementById('a-name').value = '';
  document.getElementById('a-grams').value = '';
  document.getElementById('a-kcal').value = '';
  document.getElementById('a-protein').value = '';
  document.getElementById('a-fat').value = '';
  document.getElementById('a-net_carbs').value = '';

  toast('Meal added ✓');
  showPage('dashboard');
}

// ===================== INIT =====================
loadDashboard();
</script>
</body>
</html>
