<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <title>Calory — Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0f14;--surface:#161a24;--surface2:#1e2330;--border:#252c3d;
      --accent:#6366f1;--accent2:#818cf8;--text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:360px}
    .login-box h1{font-size:1.3rem;font-weight:700;margin-bottom:4px;color:var(--accent2)}
    .login-box p{font-size:.82rem;color:var(--muted);margin-bottom:20px}
    label{display:block;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
    input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:.88rem;font-family:inherit;margin-bottom:14px}
    input:focus{outline:none;border-color:var(--accent)}
    button{width:100%;padding:10px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;background:var(--accent);color:#fff}
    button:hover{background:#4f46e5}
    #error{color:var(--red);font-size:.82rem;margin-top:8px;min-height:1.2em}
    .toggle{color:var(--accent2);font-size:.82rem;cursor:pointer;margin-top:12px;text-align:center;display:block}
    .toggle:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Calory Tracker</h1>
    <p id="auth-subtitle">Sign in to track your nutrition</p>
    <form id="auth-form">
      <label id="username-label" for="username">Username</label>
      <input id="username" type="text" autocomplete="username" required placeholder="Username"/>
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required placeholder="Password"/>
      <button type="submit" id="submit-btn">Sign In</button>
      <div id="error"></div>
    </form>
    <span class="toggle" id="toggle-link" onclick="toggleMode()">Don't have an account? Register</span>
  </div>
  <script>
    const TOKEN_KEY = 'calory_token';
    const USER_KEY = 'calory_user';

    // Redirect if already logged in
    if (localStorage.getItem(TOKEN_KEY)) {
      window.location.href = '/';
    }

    let isRegister = false;

    function toggleMode() {
      isRegister = !isRegister;
      document.getElementById('toggle-link').textContent = isRegister
        ? 'Already have an account? Sign in'
        : "Don't have an account? Register";
      document.getElementById('username-label').textContent = isRegister ? 'Username' : 'Username';
      document.getElementById('submit-btn').textContent = isRegister ? 'Create Account' : 'Sign In';
      document.getElementById('auth-subtitle').textContent = isRegister ? 'Create your Calory account' : 'Sign in to track your nutrition';
    }

    function showError(msg) {
      document.getElementById('error').textContent = msg;
    }

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      showError('');
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const endpoint = isRegister ? '/api/auth/register' : '/api/auth/login';
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Auth failed');

        localStorage.setItem(TOKEN_KEY, data.token);
        localStorage.setItem(USER_KEY, JSON.stringify(data.user));
        window.location.href = '/';
      } catch (e) {
        showError(e.message);
      }
    });
  </script>
</body>
</html>
